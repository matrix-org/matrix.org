[[guardians]]
name = "Matthew Hodgson"
pronouns = ""
project = ""
bio = """Matthew is co-founder of Matrix and project lead, and a Guardian of The Matrix.org Foundation.
His day job is CEO/CTO at Element, the company founded by the team who created Matrix in order to grow it."""
platform_statement = """My priority will continue to be on helping ensure the GB keeps focused on the long-term goals of the Foundation as laid out at [https://matrix.org/about](/about).
In particular, I want to ensure the GB focuses on ways to accelerate Matrix uptake & remove blockers on progress: helping secure funding; encouraging implementations; scaling up trust & safety work; add new memberships; finding ways to speed up spec work.

My prime directive continues to be to look for ways to help Matrix go mainstream and avoid getting stuck as a tech just for geeks and governments.

This means evolving Matrix to sustainably benefit the maximum number of people.
This can result in tough choices: how much to piggyback on the govt momentum; how to prioritise funding impls versus providing an environment for impls to grow; how to handle competing MSCs.
I hope to bring my experience leading the project so far to help navigate these choices most effectively, and work with the wider governing board to multiply Matrix's success in future.
I will also help with the interface to the SCT, sponsoring the Decentralisation WG, and translating direction from the GB into prioritising MSCs - and help navigate how to keep the braintrust of the Matrix Core Team intact while also accelerating the wider ecosystem.
"""
