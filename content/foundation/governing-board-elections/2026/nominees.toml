[[platinum_members]]
name = "Neil Johnson"
pronouns = ""
project = "Element"
bio = """Neil has been a Matrix community member since before launch in 2014. Since 2017, he has held the role of VP of Engineering Management and, later, Chief Engineering Officer at Element.

In this capacity, he has grown and supported the Element engineering organisation and has been involved in all aspects of Element’s technical contribution to Matrix overall.

Before that, he held various engineering leadership roles, starting his career as a software engineer with a focus on messaging and telephony.
"""
platform_statement = """At [FOSDEM this year](https://www.youtube.com/watch?v=EngsGD30Ow0&list=PLiJeGYCxF7INHmqgSgGu8BaNROz63vUnK&index=3) I made the point that ‘decentralisation without sustainability is just deferred centralisation’.

To be sustainable, we need a Matrix with a strong, independent Foundation, separate from Element. Disentangling can be surprisingly tricky, and the Matrix Governing board is there to help the Foundation (along with other Foundation staff) to help set it up for success.

Over the past two years, I have been working primarily towards governance and finance. Informally taking on chair responsibilities for the Governance committee. In particular, I have been trying to figure out how to help projects express their maturity and also trying to make it easier for community members to contribute to Foundation projects.

If I am re-elected, I will continue on this path, working across the board and ecosystem to create a truly independent Foundation.
"""

[[silver_members]]
name = "Runi Hammer"
pronouns = ""
project = "Meedio"
bio = """Runi Hammer is an entrepreneur and TEDx speaker who has co-founded several technology startups in artificial intelligence and nanotechnology, where he holds a patent.
He is the founder and CEO of Meedio, a European software company delivering a professional collaboration and communications platform built on Matrix, combining secure messaging, video meetings, and modern workplace communication tools."""
platform_statement = """I want to help strengthen Matrix as a foundation for independent European communications infrastructure.
I believe open protocols and interoperable platforms are essential for Europe’s digital sovereignty and long-term strategic autonomy.
My focus will be on supporting broader adoption of Matrix in professional and public-sector environments, while helping build stronger collaboration between companies and communities across the ecosystem.
I believe the long-term success of Matrix depends not only on strong technology, but also on sustainable commercial ecosystems, practical usability, and partnerships that enable open infrastructure to compete with centralized platforms at scale."""
extended_platform = "https://meedio.me"

[[silver_members]]
name = "Yoan Pintas"
pronouns = ""
project = "DINUM"
bio = """Yoan is a long time member of the Matrix ecosystem.
He was at first an employee of Element developing Android/iOS client customisation in relation with customers (mainly Tchap), before continuing his Matrix journey by working directly for the French government deployment, Tchap.
He is now the product lead of Tchap, and promote actively Matrix around all French public sector (local authorities) and beyond (EU states or commission)."""
platform_statement = """As a representative supported by DINUM, I want to help establish Matrix as the trusted open communication standard for European public administrations.

My goal is to promote Matrix as an official interoperable messaging protocol used across EU member states, European institutions, and the wider public sector. At a time when digital sovereignty has become a strategic priority, it is more important than ever to ensure that governments retain control over their communications, infrastructure, and data rather than depending on proprietary platforms.

I believe Matrix provides a unique opportunity to build secure, federated, and interoperable public communications based on open standards and open-source technologies.

On the Governing Board, I would support the long-term sustainability of the Foundation, encourage collaboration between governments and the Matrix ecosystem, and help accelerate adoption of Matrix in large-scale public-sector environments across Europe.
"""

[[silver_members]]
name = "Niklas Zender"
pronouns = ""
project = "Famedly"
bio = """I'm the founder of Famedly.
I've been working with Matrix since 2019, deploying it in some of the most regulated environments around — German hospitals.
I was one of the key drivers behind getting Matrix adopted as Germany's TI-Messenger, and I'm currently pushing for Matrix as the basis for sovereign communication infrastructure in the German public sector.
I'm technology-open by nature and always focused on what's best for users — which is why I keep coming back to Matrix as the right answer."""
platform_statement = """Matrix only wins long-term if it's genuinely independent.
That's not a given — and it's the main reason I want to be on the board.  
What I want to bring to the board is a founder's perspective — someone who thinks about the technical and the business side at the same time.
Running an organisation means dealing with funding, governance, and hard trade-offs constantly. That's exactly what a foundation needs too, and it's often underrepresented at board level.  
I'd focus on three things: the Foundation's financial sustainability and how it communicates its value to potential members and sponsors; making sure Matrix delivers on its core promise for everyone — private, interoperable, secure communication that doesn't depend on any single company; and making the Foundation work better for everyone building on or with Matrix — whether that's an organisation shipping a product or an individual contributing to the ecosystem.  
I want to be more involved in what Matrix becomes. This is how.
"""

[[ecosystem_members]]
name = "Jade Ellis"
pronouns = ""
project = "Continuwuity"
bio = """Jade is a longtime contributor to open source, and currently heads up the Continuwuity Matrix server project.
Jade is passionate about resilience, technology, safety in online communities (working with the Matrix Shared Safety Guild) and music (contributing to the MusicBrainz project, too!) Her work is felt across the ecosystem.
You may occasionally find her writing explainers or investigating something new."""
