With the support of the Continuwuity team behind her, she aims to leave Matrix better than she found it."""
extended_platform = "https://jade.ellis.link"

[[ecosystem_members]]
name = "Ajay Bura"
pronouns = ""
project = "Cinny"
bio = """Hello, I am Ajay Bura.
I am a lead developer of [Cinny](https://cinny.in) Matrix client from five-years, and was in the team behind [Third Room](https://thirdroom.io).
I have been continuously gaining experience in matrix spec based development and known to a lot of twist and turns.
My expertise also involved UI designing, implementing them in pixel perfect accuracy on Web."""
platform_statement = """Matrix is growing in masses than ever before, so does their demands from the ecosystem.
Therefore, ecosystem will have to grow out of standard chat based product offerings.
However, it is not as simple as stated, one has to build these to be served.
It is hard for ecosystem members to provide these by going out of their own tracks.

Thus, I wanted to push more barebone composable kits/features within the current ecosystem, which can than be consumed by the incoming commons.
This will not only help in creating more application on-top Matrix protocol, but will also create more stakes into the community, resulting in overall rich growth.

Apart from that, I’m a community member not affiliated with any for-profit organization.
I'm already in process of contributing by pushing my work on Cinny and around.
If elected, I can help steward the foundation for common good and to grow trust.
"""
extended_platform = "https://ajbura.github.io"

[[ecosystem_members]]
name = "Nico (Nicolas Werner)"
pronouns = ""
project = "Nheko-Reborn"
bio = """I am one of the Nheko maintainers.
I am heavily involved in the Community Moderation Effort.

I am currently employed by Famedly to work on their Matrix stuff.
I chose Famedly originally, because it was one of the smaller Matrix companies in the ecosystem and I wanted to support a more equal power distribution of companies in the Matrixsphere.

I wrote a few MSCs, primarily trying to clean up old warts in Matrix and improving edge cases.
I fixed a few big bugs in various projects all over Matrix (unbanning users from single user servers, calls via Element on not-synapse, replies, etc).

I've been active on the Governing Board for 2 years.
"""
platform_statement = """I want Matrix to be a comfy place.
This sounds trivial, but actually requires work in many areas:
- Fixing UX issues in clients and the protocol to reduce frustration and friction.
- Ensure people exist where you need them. Be that active moderators, people who can answer questions or people who can review your contributions.
- Community guidelines and guidance to ensure anybody feels welcome and empowered to contribute.
- Reduce grudges and tear down walls, that might block people from collaborating.

Additionally I want to make sure Matrix is sustainable long-term.
This means long standing issues get addressed.
But it also means to ensure diversity and reduce single points of failure.
One big example here is the historic special relationship of Element in the Foundation.
Matrix should not be reliant on a single major sponsor pushing the ecosystem forward.
Instead governance and transparency should ensure a balance is kept between the community and between all of the different commercial interests in Matrix.
And it also means people shouldn't feel like they have to solve everything alone.

Because of how draining GB work is, I actually only decided last minute to run a second time.
Feel free to vote for others if there are other nominees.
Or chat with me in the ecosystem room!
"""

[[ecosystem_members]]
name = "Kim Brose (HarHarLinks)"
pronouns = ""
project = "Matrix Community Events"
bio = """I started my free software as well as privacy centric journey at university.
The amount of services I host for my family and friends is steadily growing ever since.
In early 2017 I discovered Matrix in an effort to move my friends off proprietary messengers and into a self-hosted, sovereign, end-to-end encrypted, modern and feature-rich system.
I joined Matrix Community Summit 2022 and have been rallying a group "Matrix Community Events" organising Matrix-related events or representing at other events since.
I work on all kinds of Matrix-related software as a systems architect at Nordeck."""
platform_statement = """I joined the Matrix ecosystem first as a homeserver owner and admin for a small community, giving me the perspective of the private and less technical end user through my server's users.
Nowadays, I also get to experience the business side of Matrix every day at work.

I was lucky to be elected to the first Governing Board 2 years ago and serve a full term as its vice chair.
A lot of the work has been bootstrapping a lot of the processes we have today.
Beyond that, I successfully established and continue to sponsor the Events Working Group and Website & Content Working Group who are taking over significant everyday work at the Foundation today and help shape its public relations in doing so.

I look forward to growing the activity and involvement of the Board at the Foundation, expanding the set of Working Groups and community contributors therein, continuing to introduce missing policies and processes for the Foundation, and continuing efforts for more transparency.
"""

[[individual_members]]
name = "Max"
pronouns = ""
project = ""
bio = """Max is a self-hoster in his early 30s, a longtime Linux user, and an out member of the LGBTQ+ community.
He runs his own Matrix homeserver and has been active in online and in-person communities since his late teens.
Across years of volunteering, he has organized community spaces, led volunteer teams, moderated difficult discussions, and helped groups get practical work done through consensus and shared responsibility.
He is passionate about making federated, sovereign communication easier to understand, maintain, and advocate for.
Outside of Matrix, he tinkers with container tooling and helps others navigate self-hosting."""
platform_statement = """Matrix already has the foundation for a sovereign, federated future.
I want to contribute by making it easier for more people to use, run, contribute to, and feel welcome in Matrix.
As a homeserver admin and community volunteer, I would focus on practical work that strengthens the ecosystem.  
If elected, my priorities would be:
- Adoption and onboarding: Make Matrix easier to explain and start using, with clearer user journeys, better defaults, and friendlier docs.
- Homeserver admins and self-hosting: Support people who run Matrix infrastructure with practical docs, upgrade guidance, troubleshooting resources, and admin support.
- Education and outreach: Tell the Matrix story clearly: why sovereign communication matters, how federation works, and how people can participate.
- Trust and safety: Continue supporting Trust and Safety work, better moderation tooling, and a culture where people feel safe and welcome.
- Foundation coordination: Encourage coordination between board members, clearer shared goals, accessible governance, and outreach to community members and ecosystem partners.
- Community and non-commercial use: Support personal, community-led, volunteer, and self-hosted uses of Matrix alongside business adoption, recognizing the people who keep the network vibrant.
"""

[[individual_members]]
name = "Reid Anderson"
pronouns = ""
project = ""
bio = """Reid has closely followed open-source software for 15 years, Matrix since 2018, and has donated monthly to the Matrix Foundation since 2021.
He started as a developer building extensions and making small code contributions to Mozilla products.
He unfortunately saw first-hand the danger and difficulty in open-source funding as a community contributor to Songbird, a now-defunct open-source music player whose corporate sponsor went out of business.
He is a fundraiser and president of a local service club and currently works as a principal software engineer for a large logistics company."""
platform_statement = """I believe the most important factor for the future of Matrix is that the Matrix Foundation must be able to function, grow, and fund itself independently of Element - even with the significant progress that has been made.
It's impossible to overstate how much of a debt the Matrix community owes Element for their generosity in creating and shepherding the standard to this point, and continued support.
But for Matrix to be sustainable in the long term, there needs to be true independence between the Foundation and any individual corporate sponsor.
This means strong institutions that are responsive to the community, with members that are independent.
Helping to build and fund an effective community body is what motivates me.
My focus would be to communicate the work that the Foundation is doing as an independent entity and additional potential pathways for fundraising.
Specifically highlighting the exciting things that could be done with additional funding and how similar software foundations pursue funding.
As just one of many members on the board, I believe a positive and transparent fundraising message will help me contribute beyond just my vote.
Let's fund and build some cool stuff together."""

[[individual_members]]
name = "Mathieu Velten"
pronouns = ""
project = ""
bio = """Mathieu is a long time advocate and contributor to Matrix, first as an amateur and then professionally, for Element then Tchap French deployment.
He is currently working to open the French federation to third trusted parties."""
platform_statement = """As an individual member of the Matrix Foundation, I want to help strengthen technical collaboration across the Matrix ecosystem and encourage closer cooperation between the teams building and operating Matrix-based solutions.

My goal is to foster a more active and structured community around interoperability, knowledge sharing, and collaboration on common technical challenges.
I believe that stronger cooperation between contributors can significantly improve the quality, maturity, and adoption of Matrix.

I also want to contribute to improving the Matrix protocol itself by supporting better standardization around registration flows, onboarding mechanisms, and interoperability features that can make Matrix-based services easier to adopt and integrate.

Matrix has the potential to become a core communication layer for open and interoperable digital infrastructures.
On the Governing Board, I would support the continued evolution of the protocol, collaboration across the ecosystem, and practical improvements that make Matrix easier to deploy, operate, and adopt at scale.
"""

