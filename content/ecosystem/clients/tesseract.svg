<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="wire" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Outer cube wireframe -->
  <rect x="64" y="64" width="384" height="384"
        fill="none" stroke="url(#wire)" stroke-width="28" stroke-linejoin="round"/>

  <!-- Inner cube wireframe -->
  <rect x="163" y="163" width="186" height="186"
        fill="none" stroke="url(#wire)" stroke-width="28" stroke-linejoin="round"/>

  <!-- Corner connectors (outer → inner) -->
  <line x1="64"  y1="64"  x2="163" y2="163" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>
  <line x1="448" y1="64"  x2="349" y2="163" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>
  <line x1="448" y1="448" x2="349" y2="349" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>
  <line x1="64"  y1="448" x2="163" y2="349" stroke="#c4b5fd" stroke-width="20" stroke-linecap="round"/>
</svg>
