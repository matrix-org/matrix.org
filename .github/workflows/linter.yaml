name: Linters
on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  run:
    name: Spell Check with Typos
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Actions Repository
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        persist-credentials: false

    - name: Check spelling
      uses: crate-ci/typos@c4bcca1d1827153dc0f3ac281fe1048eaaf743d5 # v1.20.3

  rumdl-check:
    name: Lint Markdown with rumdl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: rvben/rumdl@796443d01b28fb70c2897bc9cf9fb143148a6aab # v0
        with:
          version: "0.1.2"
          config: .rumdl.toml
          report-type: annotations
